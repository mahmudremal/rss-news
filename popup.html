<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>RSS Config</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="w-80 p-6 bg-zinc-50 font-sans">
    <h2 class="text-xl font-bold mb-4 text-zinc-900">RSS Feeds</h2>

    <div class="mb-4">
      <label
        class="block text-xs font-semibold text-zinc-500 uppercase tracking-wider mb-2"
        >RSS URLs (comma separated)</label
      >
      <textarea
        id="feeds"
        rows="4"
        class="w-full p-3 text-sm bg-white border border-zinc-200 rounded-lg focus:ring-2 focus:ring-zinc-900 outline-none resize-none"
      ></textarea>
    </div>

    <button
      id="save"
      class="w-full bg-zinc-900 text-white py-2.5 rounded-lg hover:bg-zinc-800 transition-colors font-medium"
    >
      Save & Refresh
    </button>

    <div class="mt-4 flex items-center justify-between">
      <label for="offline-toggle" class="text-xs font-semibold text-zinc-500 uppercase tracking-wider" style="cursor: pointer;">Offline Reading</label>
      <label style="position: relative; display: inline-flex; align-items: center; cursor: pointer;">
        <input type="checkbox" id="offline-toggle" style="opacity: 0; width: 0; height: 0; position: absolute;">
        <div id="toggle-bg" style="width: 36px; height: 20px; background-color: #e4e4e7; border-radius: 9999px; transition: background-color 0.2s; position: relative;">
          <div id="toggle-dot" style="position: absolute; top: 2px; left: 2px; background-color: white; border-radius: 50%; width: 16px; height: 16px; transition: transform 0.2s; box-shadow: 0 1px 2px rgba(0,0,0,0.1);"></div>
        </div>
      </label>
    </div>

    <div class="mt-6 pt-4 border-t border-zinc-200 text-center">
      <p class="text-xs text-zinc-500 mb-1">
        Created by <span class="font-bold text-zinc-700">Remal Mahmud</span>
      </p>
      <a
        href="https://www.mahmudremal.com/"
        target="_blank"
        class="text-xs text-blue-600 hover:underline"
        >www.mahmudremal.com</a
      >
      <p class="text-[10px] text-zinc-400 mt-2">mahmudremal@yahoo.com</p>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
