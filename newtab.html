<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Latest News</title>
    <link rel="stylesheet" href="styles/fonts.css" />
    <link rel="stylesheet" href="styles/style.css" />
    <style>
      body {
        font-family:
          "Inter",
          "Noto Sans",
          system-ui,
          -apple-system,
          sans-serif;
        min-height: 100vh;
        color: white;
        margin: 0;
      }
      h1,
      h2,
      h3,
      .font-light,
      #clock {
        font-family: "Outfit", "Inter", "Noto Sans", sans-serif;
      }
      .glass {
        background: rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.2);
      }
      #modal-article a {
        color: #fbbf24 !important;
        text-decoration: underline !important;
        font-weight: 500;
      }
      #modal-article a:hover {
        color: #f59e0b !important;
      }
    </style>
  </head>
  <body
    class="flex flex-col items-center p-8 bg-zinc-950 overflow-x-hidden min-h-screen relative"
  >
    <div
      id="bg-image"
      class="fixed inset-0 bg-cover bg-center bg-no-repeat -z-20 pointer-events-none transform scale-105 transition-transform duration-1000"
    ></div>
    <div
      id="bg-overlay"
      class="fixed inset-0 bg-black/40 backdrop-blur-[2px] -z-10 pointer-events-none"
    ></div>

    <header class="mb-12 text-center animate-fade-in">
      <h1 id="clock" class="text-7xl font-light mb-2">00:00</h1>
      <p
        id="date"
        class="text-xl opacity-80 uppercase tracking-widest font-light"
      ></p>
    </header>

    <main
      class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 max-w-7xl w-full"
      id="news-container"
    >
      <!-- News items will be loaded here -->
    </main>

    <footer class="mt-auto pt-12 pb-4 text-center opacity-60 text-sm">
      <p>
        Handcrafted by
        <a
          href="https://www.mahmudremal.com/"
          target="_blank"
          class="hover:underline"
          >Remal Mahmud</a
        >
      </p>
      <p class="mt-1">© 2026 - Minimal RSS News</p>
    </footer>

    <!-- Article Modal -->
    <div
      id="article-modal"
      class="fixed inset-0 bg-black/80 z-50 flex-col items-center justify-center p-4 md:p-8 animate-fade-in backdrop-blur-md"
      style="display: none"
    >
      <div
        class="glass bg-zinc-900/80 w-full max-w-4xl max-h-full rounded-2xl flex flex-col overflow-hidden text-white border border-white/10 shadow-2xl"
      >
        <div
          class="flex justify-between items-center p-6 border-b border-white/10 bg-black/20"
        >
          <h2
            id="modal-title"
            class="text-xl font-bold line-clamp-1 pr-4 text-white"
          ></h2>
          <button
            id="close-modal"
            class="text-white/60 hover:text-white transition-colors p-2 flex-shrink-0"
          >
            <svg
              class="w-6 h-6"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M6 18L18 6M6 6l12 12"
              ></path>
            </svg>
          </button>
        </div>
        <div
          id="modal-content"
          class="p-6 md:p-10 overflow-y-auto flex-1 outline-none scrollbar-thin scrollbar-thumb-white/20"
          tabindex="0"
        >
          <div
            id="modal-article"
            class="prose prose-invert prose-zinc lg:prose-lg max-w-2xl mx-auto prose-p:leading-relaxed prose-a:text-amber-200 font-serif text-white/90"
          >
            <!-- Article text will be injected here -->
          </div>
        </div>
        <div
          class="p-4 md:p-6 border-t border-white/10 bg-black/20 flex flex-wrap justify-end items-center gap-4"
        >
          <div id="translator" class="hidden">
            <select
              id="language-select"
              class="bg-white/10 text-white text-sm rounded-lg border border-white/10 focus:ring-amber-500 focus:border-amber-500 block p-2 px-3 outline-none hover:bg-white/20 transition-colors cursor-pointer appearance-none min-w-[120px]"
            >
              <option value="default" class="bg-zinc-900">Default</option>
              <option value="en" class="bg-zinc-900">English</option>
              <option value="es" class="bg-zinc-900">Spanish</option>
              <option value="fr" class="bg-zinc-900">French</option>
              <option value="de" class="bg-zinc-900">German</option>
              <option value="it" class="bg-zinc-900">Italian</option>
              <option value="pt" class="bg-zinc-900">Portuguese</option>
              <option value="ru" class="bg-zinc-900">Russian</option>
              <option value="ja" class="bg-zinc-900">Japanese</option>
              <option value="ko" class="bg-zinc-900">Korean</option>
              <option value="zh-CN" class="bg-zinc-900">Chinese</option>
              <option value="bn" class="bg-zinc-900">Bengali</option>
              <option value="other" class="bg-zinc-900">Other...</option>
            </select>
          </div>
          <a
            id="modal-original-link"
            href="#"
            target="_blank"
            class="bg-white/10 text-white px-6 py-2 rounded-lg hover:bg-white/20 border border-white/10 transition-colors font-medium text-sm flex items-center gap-2"
          >
            Read Original
            <svg
              class="w-4 h-4"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"
              ></path>
            </svg>
          </a>
        </div>
      </div>
    </div>

    <script src="scripts/Readability.min.js"></script>
    <script src="scripts/translator.js"></script>
    <script src="scripts/newtab.js"></script>
  </body>
</html>
